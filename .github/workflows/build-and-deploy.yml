name: Production Build

on:
  push:
    branches: [main]
    paths:
      - "src/**/*.*"
      - "public/**/*.*"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.*"
      - "public/**/*.*"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**.yml"

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: ${{ vars.NODE_VERSION || '26.x' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 👷 Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🏗️ Setup Node.js ${{ env.NODE_VERSION }} environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true

      - name: 🏗️ Setup Nub
        uses: nubjs/setup-nub@47e5e7393d50f4e9544ddaf756aa277972afba2d # v0.4.0

      - name: ⚡ Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: 🏗️ Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: nub install

      - name: 🏗️ Build Site with Vite
        run: nub run build

      - name: 📦 Create and upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pwa-artifact
          path: "build/"
          retention-days: 1

  call-deploy-workflow:
    needs: [build]
    uses: mikesprague/reusable-workflows/.github/workflows/pages-deploy.yml@main
    secrets:
      REPO_TOKEN: ${{ secrets.GITHUB_TOKEN}}
    with:
      artifact-name: pwa-artifact

  call-lighthouse-workflow:
    needs: [call-deploy-workflow]
    uses: mikesprague/reusable-workflows/.github/workflows/lighthouse.yml@main
    secrets:
      REPO_TOKEN: ${{ secrets.GITHUB_TOKEN}}
    with:
      url: ${{ needs.call-deploy-workflow.outputs.url }}
